name: CI

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: echo "VERSION_PREFIX=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Restore
        run: dotnet restore

      - name: Build and pack
        shell: bash
        run: |
          version_args=()
          if [[ -n "${VERSION_PREFIX:-}" ]]; then
            version_args+=("-p:VersionPrefix=$VERSION_PREFIX")
          fi

          dotnet build -c Release --no-restore "${version_args[@]}"
          dotnet pack -c Release -o nupkg --no-build "${version_args[@]}"

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: nupkg
          path: nupkg/*.nupkg
          if-no-files-found: error

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    environment: nuget.org
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Download package artifact
        uses: actions/download-artifact@v4
        with:
          name: nupkg
          path: nupkg

      - name: NuGet login
        id: login
        uses: NuGet/login@v1
        with:
          user: ${{ vars.NUGET_USER || github.repository_owner }}

      - name: Push to NuGet
        run: dotnet nuget push "nupkg/*.nupkg" --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
